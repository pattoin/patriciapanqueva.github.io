<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HP Sprout Walk-UP — Patricia Panqueva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --blk:#0a0a0a;--wht:#fff;--gry:#9a9690;--sur:#eeece8;
  --acc:#0096D6;--acc-l:#E3F4FB;--acc-d:#0070A0;
  --bdr:1px solid #e8e8e8;--max:860px;
}
body{background:#f4f2ee;color:var(--blk);font-family:'DM Sans',sans-serif;font-weight:400;line-height:1.7;-webkit-font-smoothing:antialiased;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:var(--wht);border-bottom:var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 32px;}
.nav-back{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--gry);font-size:.8rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:color .15s;}
.nav-back:hover{color:var(--blk)}.nav-back svg{width:16px;height:16px;}
.nav-name{font-family:'Bebas Neue',sans-serif;letter-spacing:.04em;font-size:1rem;}
.nav-cta{font-size:.78rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gry);text-decoration:none;padding:8px 16px;transition:all .15s;}
.nav-cta:hover{background:var(--blk);color:var(--wht);}

/* HERO */
.hero{margin-top:56px;height:86vh;min-height:520px;position:relative;overflow:hidden;background:#001c2e;}
.hero-bg{position:absolute;inset:0;background:
  radial-gradient(ellipse at 80% 50%, rgba(0,150,214,.22) 0%, transparent 55%),
  radial-gradient(ellipse at 20% 80%, rgba(0,40,70,.6) 0%, transparent 60%);
}
/* Geometric grid overlay */
.hero-grid{position:absolute;inset:0;opacity:.08;background-image:
  linear-gradient(rgba(0,150,214,1) 1px, transparent 1px),
  linear-gradient(90deg, rgba(0,150,214,1) 1px, transparent 1px);
background-size:48px 48px;}

.hero-img{position:absolute;right:0;top:0;width:55%;height:100%;object-fit:cover;object-position:left center;opacity:.45;mix-blend-mode:screen;}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to right, rgba(0,18,35,.98) 38%, rgba(0,18,35,.6) 65%, transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:72px 64px;}
.hero-tag{font-size:.68rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);margin-bottom:16px;display:flex;align-items:center;gap:12px;}
.hero-tag::before{content:'';display:block;width:28px;height:2px;background:var(--acc);}
h1.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.2rem,8vw,6rem);line-height:.9;letter-spacing:.01em;color:var(--wht);margin-bottom:32px;}
h1.hero-title em{color:var(--acc);font-style:normal;}
.hero-meta{display:flex;gap:36px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.1);padding-top:24px;}
.hmi{display:flex;flex-direction:column;gap:4px;}
.hml{font-size:.6rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.3);}
.hmv{font-size:.82rem;font-weight:400;color:rgba(255,255,255,.8);}

/* ROLE STRIP */
.role-strip{background:var(--acc);padding:0 64px;display:flex;align-items:center;overflow-x:auto;scrollbar-width:none;}
.role-strip::-webkit-scrollbar{display:none}
.rc{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.9);padding:12px 20px 12px 0;white-space:nowrap;}
.rc::after{content:'·';color:rgba(255,255,255,.35);margin-left:20px;}
.rc:last-child::after{display:none}

/* CONTENT */
.content{max-width:var(--max);margin:0 auto;padding:72px 48px;}
.cs{margin-bottom:64px;}
.slabel{font-size:.6rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--acc);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.slabel::before{content:'';display:block;width:20px;height:2px;background:var(--acc);}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,3vw,2.6rem);letter-spacing:.01em;line-height:1;color:var(--blk);margin-bottom:20px;}
.body{font-size:1rem;font-weight:300;line-height:1.85;color:#2a2a2a;margin-bottom:16px;}
.body strong{font-weight:600;}
.div{width:48px;height:3px;background:var(--acc);margin:64px 0;}
.pq{border-left:3px solid var(--acc);padding:10px 0 10px 28px;margin:36px 0;}
.pq p{font-size:1.1rem;font-style:italic;font-weight:300;line-height:1.7;color:#1a1a1a;}

/* CONTEXT BAND */
.ctx-band{background:var(--blk);padding:56px 64px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:40px;}
.ctx-item{border-top:2px solid var(--acc);padding-top:18px;}
.ctx-label{font-size:.6rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:8px;}
.ctx-text{font-size:.9rem;font-weight:300;line-height:1.7;color:rgba(255,255,255,.75);}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin:32px 0;}
.stat{background:var(--wht);padding:28px 20px;text-align:center;border-top:3px solid var(--acc);}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.02em;color:var(--acc);line-height:1;margin-bottom:6px;}
.stat-l{font-size:.66rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--gry);}

/* CHALLENGE GRID */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin:24px 0;}
.cg-item{background:var(--wht);padding:28px;border-top:3px solid var(--acc);}
.cg-label{font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--acc);margin-bottom:8px;}
.cg-title{font-size:.92rem;font-weight:600;margin-bottom:6px;}
.cg-body{font-size:.84rem;font-weight:300;line-height:1.65;color:#555;}

/* PROCESS STEPS */
.process{border:1px solid #e4e2de;overflow:hidden;margin:24px 0;}
.ps{display:grid;grid-template-columns:52px 1fr;border-bottom:1px solid #e4e2de;transition:background .15s;}
.ps:last-child{border-bottom:none}.ps:hover{background:var(--acc-l);}
.ps-n{background:var(--acc);display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.04em;color:var(--wht);}
.ps-body{padding:18px 22px;}
.ps-title{font-size:.88rem;font-weight:600;margin-bottom:4px;}
.ps-desc{font-size:.8rem;font-weight:300;color:#555;line-height:1.6;}

/* SCENARIO BLOCKS */
.scene-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin:24px 0;}
.scene{background:var(--wht);padding:28px;}
.scene-num{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;letter-spacing:.02em;color:var(--acc);opacity:.25;line-height:1;margin-bottom:12px;}
.scene-title{font-size:.88rem;font-weight:600;margin-bottom:8px;}
.scene-body{font-size:.82rem;font-weight:300;line-height:1.65;color:#555;}
